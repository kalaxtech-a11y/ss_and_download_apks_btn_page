<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ridely Taxi App Demo</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

header {
  background: #111827;
  padding: 20px 40px;
}

header img { height: 40px; }

/* HERO */
.hero {
  text-align: center;
  padding: 40px 20px;
}

.hero-content {
  max-width: 900px;
  margin: auto;
}

/* VIDEO */
.video-top iframe {
  width: 100%;
  height: 420px;
  border-radius: 12px;
  border: none;
}

/* BUTTON */
.btn {
  background: #FFD54F;
  color: black;
  padding: 12px 22px;
  border-radius: 10px;
  text-decoration: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.grid img {
  width: 100%;
  border-radius: 12px;
}

/* ADMIN GRID */
.admin-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.admin-grid img {
  width: 100%;
  border-radius: 12px;
}

/* SECTION */
.section {
  padding: 30px 20px;
  max-width: 1200px;
  margin: auto;
}

footer {
  text-align: center;
  padding: 20px;
  background: #111827;
}
</style>
</head>

<body>

<header>
  <img src="https://github.com/kalaxtech-a11y/images/blob/main/logo.png?raw=true">
</header>

<section class="hero">
  <div class="hero-content">

    <!-- ✅ YOUTUBE VIDEO (WORKING) -->
    <div class="video-top">
      <iframe 
        src="https://www.youtube.com/embed/jBjahDsv0JI?rel=0&modestbranding=1&origin=https://kalaxtech-a11y.github.io"
        allowfullscreen>
      </iframe>
    </div>

    <h1>Ridely Taxi Booking App 🚖</h1>
    <p>Launch your own Uber-like app with Flutter, Firebase & real-time features</p>

  </div>
</section>

<!-- PASSENGER -->
<section class="section">
  <h2>Passenger App</h2>
  <div class="grid">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_user_1.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_user_2.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_user_3.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_user_4.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_user_5.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_user_6.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_user_7.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_user_8.jpeg?raw=true">
  </div>
</section>

<!-- DRIVER -->
<section class="section">
  <h2>Driver App</h2>
  <div class="grid">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_driver_1.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_driver_2.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_driver_3.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_driver_4.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_driver_5.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_driver_6.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_driver_7.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_driver_8.jpeg?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_driver_9.jpeg?raw=true">
  </div>
</section>

<!-- ADMIN -->
<section class="section">
  <h2>Admin Dashboard</h2>
  <div class="admin-grid">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_admin_1.png?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_admin_2.png?raw=true">
    <img src="https://github.com/kalaxtech-a11y/images/blob/main/ss_admin_3.png?raw=true">

<footer>
  <p>© Kalax Tech - Ridely Taxi App</p>
</footer>

</body>
</html>
